# Browser TV local.properties for Gecko...

# NOTE: Values surrounded in curly brackets ({}) are filled in by `build.sh`
## Currently, this includes:
## BTV_LOCAL_AC_VERSION = {BTV_LOCAL_AC_VERSION}
## BTV_LOCAL_AS_VERSION = {BTV_LOCAL_AS_VERSION}
## BROWSER_TV_GECKO = {BROWSER_TV_GECKO}

## Android Components substitution
branchBuild.android-components.version={BTV_LOCAL_AC_VERSION}

## Application Services substitution
branchBuild.application-services.version={BTV_LOCAL_AS_VERSION}

## Disable android:debuggable
debuggable=false

## Enable the auto-publication workflow for GeckoView
### https://bugzilla.mozilla.org/show_bug.cgi?id=1533465
### Disabled for now due to quirks with bundles/AARs, but this is worth re-investigating for future reference
# dependencySubstitutions.geckoviewTopobjdir={BROWSER_TV_GECKO}/obj
# dependencySubstitutions.geckoviewTopsrcdir={BROWSER_TV_GECKO}

## Ensure we always use our mozconfig
mozilla-central.mozconfig={BROWSER_TV_GECKO}/mozconfig

## Set flag for "official" builds
### Ensures we're not enabling functionality/settings meant for debugging/development
### https://gitlab.torproject.org/tpo/applications/tor-browser/-/issues/27623
official=true
